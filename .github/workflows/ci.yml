name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check services tests

      - name: Mypy type check
        run: mypy services
        continue-on-error: true   # advisory until we land annotations everywhere

      - name: Pytest
        run: PYTHONPATH=. pytest tests/ -v --cov=services --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -recursive -check
      - name: Terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false -input=false
      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate data contracts parse
        run: |
          python - <<'EOF'
          import pathlib, yaml, sys
          ok = True
          for p in pathlib.Path("schemas/data_contracts").glob("*.yml"):
              try:
                  yaml.safe_load(p.read_text())
                  print(f"OK  {p}")
              except Exception as e:
                  print(f"FAIL {p}: {e}", file=sys.stderr)
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
